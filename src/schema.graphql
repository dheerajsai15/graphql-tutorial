"A particular intergalatic location available for booking"
type Listing{
    id: ID!
    title: String!
    description: String
    numOfBeds: Int
    costPerNight: Float
    closedForBookings: Boolean
}

type Query{
    featuredListings: [Listing!]!
    "Returns the details about this listing"
    listing(id: ID!): Listing
}